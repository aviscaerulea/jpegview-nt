# vim: set ft=yaml fenc=utf-8 ff=unix sw=2 ts=2 et :
name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Extract version
        id: version
        shell: bash
        run: echo "version=${GITHUB_EVENT_RELEASE_TAG_NAME#v}" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_EVENT_RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        shell: cmd
        run: build.bat src\JPEGView.sln Release x64

      - name: Create zip
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tempDir = "out\JPEGView-nt-${version}_x64"
          New-Item -ItemType Directory -Force -Path $tempDir | Out-Null

          $srcDir = "src\JPEGView\bin\x64\Release"
          if (-not (Test-Path "$srcDir\JPEGView.exe")) {
            Write-Error "Build artifact not found: $srcDir\JPEGView.exe"
            exit 1
          }
          $items = @("*.exe", "*.dll", "*.ini", "*.ini.tpl", "KeyMap.txt.default", "NavPanel.png", "symbols.km")
          foreach ($i in $items) { Copy-Item "$srcDir\$i" $tempDir -ErrorAction SilentlyContinue }
          Copy-Item "$srcDir\language" $tempDir -Recurse
          Copy-Item "$srcDir\doc" $tempDir -Recurse
          Copy-Item "LICENSE" $tempDir

          Compress-Archive -Path "$tempDir\*" `
            -DestinationPath "out\JPEGView-nt-${version}_x64.zip" `
            -CompressionLevel Optimal -Force

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          gh release upload "$TAG" \
            "out/JPEGView-nt-${VERSION}_x64.zip" \
            --clobber
